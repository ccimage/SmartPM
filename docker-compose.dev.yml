services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smartpm
      POSTGRES_PASSWORD: smartpm
      POSTGRES_DB: smartpm
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nsqd:
    image: nsqio/nsq:v1.3.0
    command: /nsqd --lookupd-tcp-address=nsqlookupd:4160
    ports:
      - "4150:4150"
      - "4151:4151"
    depends_on:
      - nsqlookupd

  nsqlookupd:
    image: nsqio/nsq:v1.3.0
    command: /nsqlookupd
    ports:
      - "4160:4160"
      - "4161:4161"

  nsqadmin:
    image: nsqio/nsq:v1.3.0
    command: /nsqadmin --lookupd-http-address=nsqlookupd:4161
    ports:
      - "4171:4171"
    depends_on:
      - nsqlookupd

volumes:
  pg_data:
